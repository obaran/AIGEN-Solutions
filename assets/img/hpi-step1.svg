<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" font-family="&#39;Space Grotesk&#39;,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0E1320"></stop><stop offset="1" stop-color="#080A12"></stop></linearGradient>
    <linearGradient id="peri" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#A5B0EC"></stop><stop offset="1" stop-color="#4A5895"></stop></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"></path></pattern>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"></rect>
  <rect width="1200" height="750" fill="url(#grid)"></rect>

  
  <g transform="translate(90 70)">
    <circle cx="26" cy="26" r="26" fill="url(#peri)"></circle>
    <text x="26" y="35" fill="#0A0C12" font-size="26" font-weight="700" text-anchor="middle">1</text>
    <text x="74" y="22" fill="#A5B0EC" font-size="15" font-weight="700" letter-spacing="2">ÉTAPE 01</text>
    <text x="74" y="48" fill="#FFFFFF" font-size="26" font-weight="600">Import du plan</text>
  </g>

  
  <rect x="150" y="200" width="520" height="420" rx="20" fill="none" stroke="#A5B0EC" stroke-opacity="0.5" stroke-width="2.5" stroke-dasharray="10 8"></rect>
  
  <g transform="translate(250 250)">
    <rect x="40" y="40" width="260" height="320" rx="14" fill="#11151E" stroke="#FFFFFF" stroke-opacity="0.08" transform="rotate(-6 170 200)"></rect>
    <rect x="20" y="20" width="260" height="320" rx="14" fill="#141A28" stroke="#FFFFFF" stroke-opacity="0.1" transform="rotate(-3 150 180)"></rect>
    <rect x="0" y="0" width="260" height="320" rx="14" fill="#161B26" stroke="url(#peri)" stroke-width="1.5"></rect>
    
    <g transform="translate(28 28)" stroke="#A5B0EC" stroke-width="2" fill="none" opacity="0.85">
      <rect x="0" y="0" width="204" height="150" rx="2"></rect>
      <line x1="110" y1="0" x2="110" y2="150"></line><line x1="0" y1="86" x2="204" y2="86"></line>
    </g>
    <text x="28" y="232" fill="#FFFFFF" font-size="17" font-weight="600">Plan_R+2.pdf</text>
    <text x="28" y="258" fill="#8A93A8" font-size="14">PDF · PNG · JPG</text>
    <rect x="28" y="278" width="120" height="30" rx="8" fill="url(#peri)"></rect>
    <text x="88" y="298" fill="#0A0C12" font-size="13" font-weight="700" text-anchor="middle">Importé</text>
  </g>
  <g transform="translate(388 250)" fill="#CBD3FF"><path d="M0 70 v-40 h-16 l24 -30 24 30 h-16 v40 z" fill="#A5B0EC" opacity="0.9"></path></g>

  
  <g transform="translate(760 250)">
    <text x="0" y="0" fill="#FFFFFF" font-size="22" font-weight="600">Tous vos formats, en un glisser-déposer</text>
    <g font-size="16.5" fill="#AEB6C6">
      <g transform="translate(0 50)"><circle cx="11" cy="-5" r="11" fill="#A5B0EC" opacity="0.18"></circle><path d="M6 -5 l3 3 6 -7" stroke="#A5B0EC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path><text x="34" y="0">Plans PDF ou images de plans</text></g>
      <g transform="translate(0 92)"><circle cx="11" cy="-5" r="11" fill="#A5B0EC" opacity="0.18"></circle><path d="M6 -5 l3 3 6 -7" stroke="#A5B0EC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path><text x="34" y="0">Plusieurs niveaux d&#39;un même bâtiment</text></g>
      <g transform="translate(0 134)"><circle cx="11" cy="-5" r="11" fill="#A5B0EC" opacity="0.18"></circle><path d="M6 -5 l3 3 6 -7" stroke="#A5B0EC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path><text x="34" y="0">Mise à l&#39;échelle détectée automatiquement</text></g>
      <g transform="translate(0 176)"><circle cx="11" cy="-5" r="11" fill="#A5B0EC" opacity="0.18"></circle><path d="M6 -5 l3 3 6 -7" stroke="#A5B0EC" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path><text x="34" y="0">Aucune installation : 100% navigateur</text></g>
    </g>
  </g>
</svg>