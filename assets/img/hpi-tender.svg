nchor="middle">IA</text><text x="540" y="414" font-size="12.5" fill="#9aa3b5" text-anchor="middle">analyse</text><path d="M540,300 l5,14 14,5 -14,5 -5,14 -5,-14 -14,-5 14,-5 z" fill="#4F73D9"/><line x1="604" y1="394" x2="752" y2="394" stroke="#4F73D9" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="770" y="236" width="350" height="316" rx="16" fill="#11151E" stroke="#283450" stroke-width="1.5"/><text x="794" y="276" font-size="19" font-weight="700" fill="#EEF1F8">Déboursé sec · pré-rempli</text><rect x="786" y="292" width="318" height="30" rx="6" fill="#1b2333"/><text x="794" y="312" font-size="13" font-weight="700" fill="#9aa3b5">Poste</text><text x="940" y="312" font-size="13" font-weight="700" fill="#9aa3b5">Qté</text><text x="1000" y="312" font-size="13" font-weight="700" fill="#9aa3b5">P.U.</text><text x="1060" y="312" font-size="13" font-weight="700" fill="#9aa3b5">Total</text><text x="794" y="350" font-size="13.5" fill="#D6DCEA">Maçonnerie</text><text x="940" y="350" font-size="13.5" fill="#AEB6C6">120</text><text x="1000" y="350" font-size="13.5" fill="#AEB6C6">45</text><text x="1060" y="350" font-size="13.5" fill="#AEB6C6">5 400</text><line x1="786" y1="360" x2="1104" y2="360" stroke="#1e2636"/><text x="794" y="384" font-size="13.5" fill="#D6DCEA">Cloisons</text><text x="940" y="384" font-size="13.5" fill="#AEB6C6">340</text><text x="1000" y="384" font-size="13.5" fill="#AEB6C6">18</text><text x="1060" y="384" font-size="13.5" fill="#AEB6C6">6 120</text><line x1="786" y1="394" x2="1104" y2="394" stroke="#1e2636"/><text x="794" y="418" font-size="13.5" fill="#D6DCEA">Peinture</text><text x="940" y="418" font-size="13.5" fill="#AEB6C6">510</text><text x="1000" y="418" font-size="13.5" fill="#AEB6C6">12</text><text x="1060" y="418" font-size="13.5" fill="#AEB6C6">6 120</text><line x1="786" y1="428" x2="1104" y2="428" stroke="#1e2636"/><text x="794" y="452" font-size="13.5" fill="#D6DCEA">Plomberie</text><text x="940" y="452" font-size="13.5" fill="#AEB6C